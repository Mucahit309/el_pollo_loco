<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>El Pollo Loco</title>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="models/status-bar-bottle.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/coin-bar.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/levels/level1.js"></script>
    <script src="models/ui.class.js"></script>
    <link rel="icon" href="/img/6_salsa_bottle/salsa_bottle.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="init()">
    <h1>El Pollo Loco</h1>

    <div class="game-container" id="fullscreen-container">
      <button id="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
      
      <canvas id="canvas" width="720" height="480"></canvas>

      <div id="mobile-controls" class="mobile-only d-none">
        <div class="movement-controls">
          <div id="btn-left" class="touch-btn">◀</div>
          <div id="btn-right" class="touch-btn">▶</div>
        </div>
        <div class="action-controls">
          <div id="btn-jump" class="touch-btn">JUMP</div>
          <div id="btn-throw" class="touch-btn">THROW</div>
        </div>
      </div>

      <div id="start-screen" class="game-screen">
        <div class="button-container">
          <button id="btn-start" class="game-button" onclick="startGame()">Start Game</button>
          <button id="btn-controls" class="game-button">Controls</button>
        </div>
      </div>

      <div id="controls-screen" class="game-screen hidden">
        <button id="btn-close-controls" class="close-button">X</button>
        <h2>Controls</h2>
        <div class="controls-list">
          <div class="control-row">
            <div class="keys">
              <span class="game-key">◀</span>
              <span class="game-key">▶</span>
            </div>
            <span class="control-desc">Move Left / Right</span>
          </div>
          <div class="control-row">
            <div class="keys">
              <span class="game-key">D</span>
            </div>
            <span class="control-desc">Throw Bottle</span>
          </div>
          <div class="control-row">
            <div class="keys">
              <span class="game-key wide-key">SPACE</span>
            </div>
            <span class="control-desc">Jump</span>
          </div>
        </div>
      </div>

      <div id="game-over-screen" class="game-over-screen d-none">
        <img
          class="bg-image"
          src="img/9_intro_outro_screens/game_over/game over.png"
          alt="Game Over"
        />
        <div class="buttons">
          <button class="game-button" onclick="mainMenu()">Main Menu</button>
          <button class="game-button" onclick="restartGame()">Retry</button>
        </div>
      </div>

      <div id="win-screen" class="game-over-screen d-none">
        <img
          class="bg-image"
          src="img/You won, you lost/You Win A.png"
          alt="You Win"
        />
        <div class="buttons">
          <button class="game-button" onclick="mainMenu()">Main Menu</button>
          <button class="game-button" onclick="restartGame()">Retry</button>
        </div>
      </div>
    </div>

    <script src="js/game.js"></script>
  </body>
</html>
